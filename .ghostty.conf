# ============================================
# Ghostty Terminal - Complete Configuration
# ============================================

# --- Typography ---
font-family = "Fira Code"
font-size = 13

# --- Theme and Colors ---
theme = TokyoNight

# --- Window and Appearance ---
background-opacity = 0.92
window-padding-x = 12
window-padding-y = 12
window-decoration = true
macos-titlebar-style = transparent
window-width = 135
window-height = 40
window-theme = auto

# cursor
cursor-style = block
cursor-style-blink = true
